services:
  db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-MiniPDV@2026!}"
    volumes:
      - mssql-data:/var/opt/mssql/data
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/1433"]
      interval: 5s
      timeout: 3s
      retries: 8
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Containerfile
    image: minipdv-api
    env_file: .env
    environment:
      DB_SERVER: "db"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mssql-data:
