info:
  name: Register
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/auth/register"
  body:
    type: json
    data: |-
      {
        "nome": "{{nome}}",
        "login": "{{login}}",
        "password": "{{senha}}"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
