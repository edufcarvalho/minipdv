info:
  name: Logout
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/api/auth/logout"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("token", '');

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
