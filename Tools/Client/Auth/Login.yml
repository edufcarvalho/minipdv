info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/auth/login"
  body:
    type: json
    data: ""

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body.token) {
          bru.setVar("token", body.token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
