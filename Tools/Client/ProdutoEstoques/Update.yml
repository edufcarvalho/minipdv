info:
  name: Update
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseUrl}}/api/produtos/{{produtoId}}/estoques/{{lote}}"
  auth: inherit
  body:
    type: json
    data: |-
      {
        "produtoId": {{produtoId}},
        "lote": "{{lote}}",
        "fabricacao": "2025-01-01",
        "validade": "2027-01-01",
        "quantidade": 100,
        "registroMS": null
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
