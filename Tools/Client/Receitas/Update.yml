info:
  name: Update
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseUrl}}/api/receitas/{{id}}"
  body:
    type: json
    data: |-
      {
        "id": {{id}},
        "prescritorId": 1,
        "pacienteId": 1,
        "compradorId": 1,
        "dataReceita": null,
        "dataCadastro": null,
        "produtos": [
          { "produtoId": {{id}}, "lote": "{{lote}}", "quantidade": 1 }
        ]
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
